<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <!-- Background -->
  <rect width="40" height="40" rx="8" fill="#ffffff"/>
  <!-- Main body (calculator outline) -->
  <rect x="4" y="6" width="32" height="30" rx="4" fill="none" stroke="#0f172a" stroke-width="2.5"/>
  <!-- Screen -->
  <rect x="8" y="10" width="24" height="8" rx="2" fill="#f1f5f9" stroke="#0f172a" stroke-width="0.75"/>
  <line x1="10" y1="14" x2="20" y2="14" stroke="#0f172a" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <!-- Keypad row 1 -->
  <rect x="8" y="22" width="6" height="4" rx="1" fill="#0f172a"/>
  <rect x="17" y="22" width="6" height="4" rx="1" fill="#0f172a"/>
  <rect x="26" y="22" width="6" height="4" rx="1" fill="#0f172a"/>
  <!-- Keypad row 2 -->
  <rect x="8" y="29" width="6" height="4" rx="1" fill="#0f172a"/>
  <rect x="17" y="29" width="6" height="4" rx="1" fill="#0f172a"/>
  <rect x="26" y="29" width="6" height="4" rx="1" fill="#315efb"/>
  <!-- Top accent line -->
  <path d="M16 4 L24 4" stroke="#0f172a" stroke-width="2.5" stroke-linecap="round"/>
</svg>
