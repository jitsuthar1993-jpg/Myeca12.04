    <!-- Inline skeleton shimmer animation -->
    <style>
      @keyframes skel{0%{background-position:-200% 0}100%{background-position:200% 0}}
      .skel{background:linear-gradient(90deg,#e2e8f0 25%,#f1f5f9 50%,#e2e8f0 75%);background-size:200% 100%;animation:skel 1.5s infinite}
      @media(prefers-reduced-motion:reduce){.skel{animation:none}}
    </style>
  </head>
  <body>
    <div id="root">
      <div style="min-height:100vh;background:#fff;display:flex;flex-direction:column">
        <div style="height:64px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;padding:0 24px">
          <div class="skel" style="width:40px;height:40px;border-radius:12px"></div>
          <div class="skel" style="margin-left:12px;width:100px;height:20px;border-radius:6px"></div>
        </div>
        <div style="flex:1;max-width:896px;margin:48px auto;padding:0 16px;width:100%;text-align:center">
          <div class="skel" style="width:160px;height:20px;border-radius:9999px;margin:0 auto 16px"></div>
          <div class="skel" style="width:75%;height:40px;border-radius:8px;margin:0 auto 12px"></div>
          <div class="skel" style="width:60%;height:24px;border-radius:8px;margin:0 auto 24px"></div>
          <div style="display:flex;gap:12px;justify-content:center">
            <div class="skel" style="width:144px;height:44px;border-radius:8px"></div>
            <div class="skel" style="width:144px;height:44px;border-radius:8px"></div>
          </div>
        </div>
      </div>
    </div>
    <script>
      // Global error handler for uncaught errors
      window.onerror = function(msg, url, line) {
        document.getElementById('root').innerHTML = '<div style="padding:20px;background:#fee;border:2px solid red;margin:20px;border-radius:8px;"><h2 style="color:red;">JavaScript Error</h2><p><strong>' + msg + '</strong></p><p style="color:#666;">At: ' + url + ':' + line + '</p><p style="margin-top:15px;"><button onclick="location.reload(true)" style="padding:10px 20px;background:#007bff;color:white;border:none;border-radius:4px;cursor:pointer;">Reload Page</button></p></div>';
        return false;
      };
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
